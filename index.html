<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答辩状自动生成器 - 专业版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Microsoft YaHei',sans-serif;background:#eef2f5;padding:15px;}
        .header{background:linear-gradient(135deg,#1a3a4f,#0f2b3d);color:white;padding:15px 25px;border-radius:12px;margin-bottom:20px;}
        .header h1{font-size:22px;}
        .header p{font-size:12px;opacity:0.8;margin-top:6px;}
        .main{display:flex;gap:20px;flex-wrap:wrap;}
        .left{flex:1.2;min-width:380px;background:white;border-radius:12px;padding:18px;max-height:calc(100vh-130px);overflow-y:auto;}
        .section{border:1px solid #ddd;border-radius:10px;margin-bottom:18px;}
        .section-title{background:#f8f9fa;padding:10px 15px;font-weight:600;font-size:14px;color:#1a3a4f;border-left:4px solid #2c7da0;border-bottom:1px solid #ddd;}
        .section-body{padding:14px;}
        .row{margin-bottom:10px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
        .label{width:90px;font-size:13px;font-weight:500;}
        input,select,textarea{flex:1;min-width:180px;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;}
        textarea{min-height:80px;}
        .party-item{display:flex;align-items:center;gap:8px;padding:5px;background:#f8f9fa;margin-bottom:5px;border-radius:6px;flex-wrap:wrap;}
        .party-check{width:16px;height:16px;}
        .party-input{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:4px;}
        .btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;cursor:pointer;}
        .btn-primary{background:#2c7da0;color:white;}
        .btn-success{background:#27ae60;color:white;}
        .btn-danger{background:#e74c3c;color:white;}
        .btn-warning{background:#e67e22;color:white;}
        .btn-sm{padding:4px 10px;}
        .btn-group{display:flex;gap:8px;margin-top:10px;}
        .checkbox-row{margin-bottom:8px;}
        .checkbox-row label{display:flex;align-items:center;gap:5px;cursor:pointer;}
        .status-bar{background:#f8f9fa;padding:8px 20px;border-top:1px solid #ddd;font-size:12px;display:flex;justify-content:space-between;border-radius:0 0 12px 12px;}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;}
        .modal-content{background:white;border-radius:12px;width:500px;max-width:90%;max-height:80%;overflow:hidden;}
        .modal-header{padding:12px 20px;background:#1a3a4f;color:white;display:flex;justify-content:space-between;}
        .modal-body{padding:12px;overflow-y:auto;max-height:400px;}
        .modal-footer{padding:10px;border-top:1px solid #ddd;display:flex;gap:10px;justify-content:flex-end;}
        .memory-item{padding:8px;border-bottom:1px solid #ddd;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a3a4f;color:white;padding:6px 18px;border-radius:30px;font-size:12px;z-index:1100;opacity:0;transition:opacity 0.3s;}
        .close-btn{background:none;border:none;color:white;font-size:20px;cursor:pointer;}
    </style>
</head>
<body>

<div class="header">
    <h1>⚖️ 答辩状自动生成器 - 专业版</h1>
    <p>支持被告选择 | 租赁期限可选 | 多当事人管理 | 智能记忆 | 责任划分</p>
</div>

<div class="main">
    <div class="left">
        <div class="section"><div class="section-title">📋 案件基本信息</div><div class="section-body"><div class="row"><span class="label">案号：</span><input type="text" id="caseNumber" value="(2026)湘0102民初4189号"></div><div class="row"><span class="label">案由：</span><input type="text" id="caseReason" value="机动车交通事故责任纠纷"></div></div></div>

        <div class="section"><div class="section-title">👥 当事人管理</div><div class="section-body">
            <div style="margin-bottom:12px;"><div style="font-weight:500;margin-bottom:6px;color:#27ae60;">原告列表</div><div id="plaintiffList"></div><div class="btn-group"><button class="btn btn-success btn-sm" id="addPlaintiffBtn">➕ 添加原告</button><button class="btn btn-danger btn-sm" id="removePlaintiffBtn">➖ 删除最后原告</button></div></div>
            <div style="margin-bottom:12px;"><div style="font-weight:500;margin-bottom:6px;color:#e67e22;">被告列表（勾选表示答辩人）</div><div id="defendantList"></div><div class="btn-group"><button class="btn btn-success btn-sm" id="addDefendantBtn">➕ 添加被告</button><button class="btn btn-danger btn-sm" id="removeDefendantBtn">➖ 删除最后被告</button></div></div>
            <div><div style="font-weight:500;margin-bottom:6px;color:#3498db;">第三人列表</div><div id="thirdList"></div><div class="btn-group"><button class="btn btn-success btn-sm" id="addThirdBtn">➕ 添加第三人</button><button class="btn btn-danger btn-sm" id="removeThirdBtn">➖ 删除最后第三人</button></div></div>
        </div></div>

        <div class="section"><div class="section-title">🏢 公司信息</div><div class="section-body"><div class="row"><span class="label">负责人：</span><input type="text" id="legalRep" value="李迅"></div><div class="row"><span class="label">联系方式：</span><input type="text" id="contact" value="13476533212"></div></div></div>

        <div class="section"><div class="section-title">🚗 车辆信息</div><div class="section-body"><div class="row"><span class="label">车牌号：</span><input type="text" id="licensePlate" value="湘AD88822"></div><div class="row"><span class="label">车架号：</span><input type="text" id="vin" value="LDF31B9661G837273"></div><div class="row"><span class="label">合同编号：</span><input type="text" id="contractNo" value="DFCX-2024-01330"></div>
            <div class="checkbox-row"><label><input type="checkbox" id="hasDeliveryDate" checked> 有交付日期</label></div><div class="row" id="deliveryRow"><span class="label">交付日期：</span><input type="text" id="deliveryDate" value="2025年1月31日"></div>
            <div class="checkbox-row"><label><input type="checkbox" id="hasRentalPeriod" checked> 有租赁期限</label></div><div class="row" id="rentalRow"><span class="label">租赁期限：</span><input type="text" id="rentalStart" style="flex:0.8" value="2025年4月21日"><span>至</span><input type="text" id="rentalEnd" style="flex:0.8" value="2025年7月20日"></div>
            <div class="row"><span class="label">事故日期：</span><input type="text" id="accidentDate" value="2025年4月25日"></div>
        </div></div>

        <div class="section"><div class="section-title">🔗 租赁链信息</div><div class="section-body"><div class="checkbox-row"><label><input type="checkbox" id="autoGeneratePoint2" checked> 自动生成第二点</label></div><div class="row"><span class="label">所有权人：</span><input type="text" id="ownerName" value="创越长沙分公司"></div>
            <div id="lesseeList"></div><div class="btn-group"><button class="btn btn-success btn-sm" id="addLesseeBtn">➕ 添加承租人</button><button class="btn btn-danger btn-sm" id="removeLesseeBtn">➖ 删除最后承租人</button></div>
            <div class="row" style="margin-top:8px;"><span class="label">实际驾驶人：</span><input type="text" id="driverName" value="被告一"></div>
            <div class="row"><span class="label">事故原因描述：</span><input type="text" id="accidentReason" value="被告一的过错行为"></div>
            <div class="row"><span class="label">最后合同名称：</span><input type="text" id="lastContractName" value="网约车直营合作协议"></div>
        </div></div>

        <div class="section"><div class="section-title">⚖️ 责任划分</div><div class="section-body"><div class="row"><span class="label">责任类型：</span><select id="liabilityType"><option value="全部责任">全部责任</option><option value="主要责任">主要责任</option><option value="同等责任">同等责任</option><option value="次要责任">次要责任</option><option value="无责任">无责任</option></select></div><div class="row"><span class="label">责任比例：</span><input type="text" id="liabilityPercentage" style="width:80px;" value="100">%</div></div></div>

        <div class="section"><div class="section-title">✍️ 答辩要点</div><div class="section-body"><textarea id="defensePoints" rows="10" style="width:100%;"></textarea><div class="btn-group"><button class="btn btn-primary" id="generateBtn">📄 生成答辩状（下载DOCX）</button><button class="btn btn-warning" id="memoryBtn">📚 记忆管理</button></div></div></div>
    </div>
</div>

<div id="memoryModal" class="modal"><div class="modal-content"><div class="modal-header"><span>📚 记忆管理</span><button class="close-btn" id="closeModalBtn">×</button></div><div class="modal-body" id="memoryList"></div><div class="modal-footer"><button class="btn btn-danger btn-sm" id="clearMemoryBtn">清空所有</button><button class="btn btn-primary btn-sm" id="closeModalBtn2">关闭</button></div></div></div>
<div id="toast" class="toast"></div>

<script>
(function(){
    // 检查docx库是否加载
    if(typeof window.docx === 'undefined'){
        // 如果库还没加载，显示提示
        let statusDiv = document.createElement('div');
        statusDiv.className = 'status-bar';
        statusDiv.style.position = 'fixed';
        statusDiv.style.bottom = '0';
        statusDiv.style.left = '0';
        statusDiv.style.right = '0';
        statusDiv.style.margin = '0';
        statusDiv.style.borderRadius = '0';
        statusDiv.innerHTML = '<span>⚠️ 正在加载库文件，请稍候... 如长时间无响应，请检查网络后刷新页面</span><span>⚖️</span>';
        document.body.appendChild(statusDiv);
    }
})();

// 等待库加载完成后执行
function waitForDocx(callback){
    if(typeof window.docx !== 'undefined' && typeof window.saveAs !== 'undefined'){
        callback();
    }else{
        setTimeout(function(){ waitForDocx(callback); }, 500);
    }
}

// 数据
let plaintiffs = ['田书敏'];
let defendants = ['刘欣', '长沙石榴汽车服务有限公司', '武汉东风电动创越工贸有限公司长沙分公司', '中国人寿财产保险股份有限公司长沙市中心支公司'];
let defendantChecked = [false, false, true, false];
let thirdParties = [];
let lessees = [
    {name:'长沙石榴汽车服务有限公司', short:'被告二'},
    {name:'长沙梦梦新能源科技有限公司', short:'梦梦公司'}
];
let memoryDB = {};

function showToast(msg){
    let t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2000);
}

function loadMemory(){
    let s = localStorage.getItem('defense_memory');
    if(s) memoryDB = JSON.parse(s);
}
function saveMemory(){
    localStorage.setItem('defense_memory', JSON.stringify(memoryDB));
}
function updateMemory(name, legal, contact){
    if(name && (legal || contact)){
        memoryDB[name] = {legal_rep: legal, contact: contact};
        saveMemory();
    }
}
function getDefenderInfo(){
    for(let i=0; i<defendantChecked.length; i++) if(defendantChecked[i]) return {name: defendants[i]};
    if(defendants.length) return {name: defendants[0]};
    return null;
}
function autoFillFromMemory(){
    let d = getDefenderInfo();
    if(d && memoryDB[d.name]){
        if(memoryDB[d.name].legal_rep) document.getElementById('legalRep').value = memoryDB[d.name].legal_rep;
        if(memoryDB[d.name].contact) document.getElementById('contact').value = memoryDB[d.name].contact;
    }
}

function renderPlaintiffs(){
    let c = document.getElementById('plaintiffList');
    c.innerHTML = '';
    for(let i=0; i<plaintiffs.length; i++){
        let div = document.createElement('div');
        div.className = 'party-item';
        div.innerHTML = `<span>原告${i+1}：</span><input class="party-input" value="${plaintiffs[i]}" onchange="plaintiffs[${i}]=this.value">`;
        c.appendChild(div);
    }
}
function addPlaintiff(){ plaintiffs.push('新原告'); renderPlaintiffs(); }
function removePlaintiff(){ if(plaintiffs.length>1) plaintiffs.pop(); renderPlaintiffs(); }

function renderDefendants(){
    let c = document.getElementById('defendantList');
    c.innerHTML = '';
    for(let i=0; i<defendants.length; i++){
        let div = document.createElement('div');
        div.className = 'party-item';
        div.innerHTML = `
            <input type="checkbox" class="party-check" ${defendantChecked[i]?'checked':''} onchange="updateCheck(${i}, this.checked)">
            <span>被告${i+1}：</span>
            <input class="party-input" value="${defendants[i]}" onchange="defendants[${i}]=this.value">
        `;
        c.appendChild(div);
    }
}
function updateCheck(idx, checked){
    for(let i=0; i<defendantChecked.length; i++) defendantChecked[i] = false;
    defendantChecked[idx] = checked;
    renderDefendants();
    autoFillFromMemory();
}
function addDefendant(){ defendants.push('新被告'); defendantChecked.push(false); renderDefendants(); }
function removeDefendant(){ if(defendants.length>1){ defendants.pop(); defendantChecked.pop(); } renderDefendants(); }

function renderThirdParties(){
    let c = document.getElementById('thirdList');
    c.innerHTML = '';
    for(let i=0; i<thirdParties.length; i++){
        let div = document.createElement('div');
        div.className = 'party-item';
        div.innerHTML = `<span>第三人：</span><input class="party-input" value="${thirdParties[i]}" onchange="thirdParties[${i}]=this.value">`;
        c.appendChild(div);
    }
}
function addThirdParty(){ thirdParties.push(''); renderThirdParties(); }
function removeThirdParty(){ if(thirdParties.length) thirdParties.pop(); renderThirdParties(); }

function renderLessees(){
    let c = document.getElementById('lesseeList');
    c.innerHTML = '';
    for(let i=0; i<lessees.length; i++){
        let div = document.createElement('div');
        div.className = 'party-item';
        div.innerHTML = `
            <span>承租人${i+1}：</span>
            <input class="party-input" placeholder="名称" value="${lessees[i].name}" style="flex:1.5" onchange="lessees[${i}].name=this.value">
            <span>简称：</span>
            <input class="party-input" placeholder="简称" value="${lessees[i].short}" style="width:80px" onchange="lessees[${i}].short=this.value">
        `;
        c.appendChild(div);
    }
}
function addLessee(){ lessees.push({name:'',short:''}); renderLessees(); }
function removeLessee(){ if(lessees.length>1) lessees.pop(); renderLessees(); }

function toChineseNum(num){
    const chinese = ['零','一','二','三','四','五','六','七','八','九','十'];
    if(num <= 10) return chinese[num];
    return num.toString();
}

function getPartyString(){
    let p = plaintiffs.filter(x=>x).join('、');
    let d = defendants.map((name, i) => `被告${toChineseNum(i+1)}${name}`).join('、');
    let t = thirdParties.filter(x=>x).join('、');
    let r = '';
    if(p) r = '原告' + p;
    if(d) r += '诉' + d;
    if(t) r += '、第三人' + t;
    return r;
}

function getPoint2(){
    if(!document.getElementById('autoGeneratePoint2').checked) return '';
    let o = document.getElementById('ownerName').value;
    let dr = document.getElementById('driverName').value;
    let lp = document.getElementById('licensePlate').value;
    let v = document.getElementById('vin').value;
    let cn = document.getElementById('contractNo').value;
    let dl = document.getElementById('hasDeliveryDate').checked ? document.getElementById('deliveryDate').value : '';
    let rf = document.getElementById('rentalStart').value;
    let rt = document.getElementById('rentalEnd').value;
    let ad = document.getElementById('accidentDate').value;
    let ar = document.getElementById('accidentReason').value;
    let lcn = document.getElementById('lastContractName').value;
    let first = lessees[0];
    let second = lessees[1];
    let txt = `${o}将案涉车辆（车牌号：${lp} 车架号：${v}）出租给被告二，被告二又将案涉车辆出租交付给案外人${second.name}（以下简称“${second.short}”）。${second.short}又将车辆交付给${dr}使用。${o}与被告二、${second.short}、${dr}是租赁关系，事故发生时，由${dr}实际驾驶、使用车辆，${o}作为所有权人不存在任何过错，不应当承担任何责任。\n\n`;
    txt += `《中华人民共和国民法典》第一千二百零九条规定：“因租赁、借用等情形，机动车所有人、管理人与使用人不是同一人时，发生交通事故造成损害，属于该机动车一方责任的，由机动车使用人承担赔偿责任；机动车所有人、管理人对损害的发生有过错的，承担相应的赔偿责任。”\n\n`;
    txt += `本案中，${o}将案涉车辆交付给被告二，被告二又将案涉车辆转租给${second.short}。${second.short}又与${dr}签署《${lcn}》，将案涉车辆出租交付给${dr}使用，租赁期间为${rf}至${rt}。${ad}，交通事故发生在租赁期间，由${dr}使用、驾驶案涉车辆。\n\n`;
    txt += `事故发生时车辆检验合格，技术状态良好。事故发生是由于${ar}导致，与车辆本身质量不存在任何关系，原告未能证明${o}对案涉交通事故的发生存在过错，亦无证据证明存在应由${o}承担赔偿责任的其他情形。`;
    return txt;
}

async function generateDefense(){
    let d = getDefenderInfo();
    if(!d){ showToast('请勾选答辩人'); return; }
    
    let lt = document.getElementById('liabilityType').value;
    let pct = document.getElementById('liabilityPercentage').value;
    let ldesc = '';
    if(lt=='全部责任') ldesc = '根据交通事故责任认定书，被告一承担事故全部责任，被告一为侵权人，应当由被告一对原告损失承担全部赔偿责任。';
    else if(lt=='主要责任') ldesc = `根据交通事故责任认定书，被告一承担事故的主要责任，应当由被告一对原告损失承担${pct}%赔偿责任。`;
    else if(lt=='同等责任') ldesc = `根据交通事故责任认定书，被告一承担事故的同等责任，应当由被告一对原告损失承担${pct}%赔偿责任。`;
    else if(lt=='次要责任') ldesc = `根据交通事故责任认定书，被告一承担事故的次要责任，应当由被告一对原告损失承担${pct}%赔偿责任。`;
    else ldesc = '根据交通事故责任认定书，被告一不承担事故责任，不应当承担赔偿责任。';
    
    let pts = document.getElementById('defensePoints').value;
    pts = pts.replace('{liability_description}', ldesc);
    pts = pts.replace('{point2_placeholder}', getPoint2());
    
    let partyStr = getPartyString();
    let caseNum = document.getElementById('caseNumber').value;
    let caseReason = document.getElementById('caseReason').value;
    let legalRep = document.getElementById('legalRep').value;
    let contact = document.getElementById('contact').value;
    let intro = `${partyStr}${caseReason}一案（案号为：${caseNum}），答辩人现依据事实和法律答辩如下：`;
    
    let today = new Date();
    let dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
    
    let docx = window.docx;
    if(!docx){ showToast('库加载中，请稍后再试'); return; }
    let Document = docx.Document;
    let Paragraph = docx.Paragraph;
    let TextRun = docx.TextRun;
    let AlignmentType = docx.AlignmentType;
    let convertInchesToTwip = docx.convertInchesToTwip || function(inches){ return inches * 1440; };
    
    let children = [];
    children.push(new Paragraph({alignment: AlignmentType.CENTER, children: [new TextRun({text:'答辩状', bold:true, size:32})]}));
    children.push(new Paragraph({}));
    children.push(new Paragraph({children: [new TextRun({text:`答辩人：${d.name}`, size:28})]}));
    children.push(new Paragraph({children: [new TextRun({text:'通讯地址：湖北省武汉市经济技术开发区创业路70号', size:28})]}));
    children.push(new Paragraph({children: [new TextRun({text:`负责人：${legalRep}`, size:28})]}));
    children.push(new Paragraph({children: [new TextRun({text:`联系方式：${contact}`, size:28})]}));
    children.push(new Paragraph({}));
    children.push(new Paragraph({children: [new TextRun({text:intro, size:28})]}));
    
    let paras = pts.split('\n\n');
    for(let p of paras){
        if(p.trim()){
            let isBold = p.startsWith('一、') || p.startsWith('二、') || p.startsWith('三、');
            children.push(new Paragraph({children: [new TextRun({text:p.trim(), bold:isBold, size:28})]}));
        }
    }
    
    children.push(new Paragraph({children: [new TextRun({text:'综上所述，原告要求被告承担赔偿责任，没有法律和事实依据，请法院予以驳回。', size:28})]}));
    children.push(new Paragraph({}));
    children.push(new Paragraph({}));
    children.push(new Paragraph({alignment: AlignmentType.RIGHT, children: [new TextRun({text:`答辩人：${d.name}`, size:28})]}));
    children.push(new Paragraph({alignment: AlignmentType.RIGHT, children: [new TextRun({text:dateStr, size:28})]}));
    
    let doc = new Document({
        sections: [{
            properties: { page: { margin: { top: convertInchesToTwip(1), bottom: convertInchesToTwip(1), left: convertInchesToTwip(1.2), right: convertInchesToTwip(1.2) } } },
            children: children
        }]
    });
    
    let blob = await docx.Packer.toBlob(doc);
    let plaintiffName = plaintiffs[0] || '未知';
    let filename = `答辩状${plaintiffName}.docx`;
    saveAs(blob, filename);
    updateMemory(d.name, legalRep, contact);
    showToast(`✅ 已生成：${filename}`);
}

function showMemoryPanel(){
    let modal = document.getElementById('memoryModal');
    let list = document.getElementById('memoryList');
    list.innerHTML = '';
    for(let name in memoryDB){
        let div = document.createElement('div');
        div.className = 'memory-item';
        div.innerHTML = `${name} | 负责人：${memoryDB[name].legal_rep||''} | 电话：${memoryDB[name].contact||''}`;
        list.appendChild(div);
    }
    if(Object.keys(memoryDB).length === 0) list.innerHTML = '<div style="text-align:center;color:#999;">暂无数据</div>';
    modal.style.display = 'flex';
}
function closeMemoryPanel(){ document.getElementById('memoryModal').style.display = 'none'; }
function clearAllMemory(){
    if(confirm('清空所有记忆？')){
        memoryDB = {};
        saveMemory();
        showMemoryPanel();
        showToast('已清空');
    }
}

function toggleDelivery(){ document.getElementById('deliveryRow').style.display = document.getElementById('hasDeliveryDate').checked ? 'flex' : 'none'; }
function toggleRental(){ document.getElementById('rentalRow').style.display = document.getElementById('hasRentalPeriod').checked ? 'flex' : 'none'; }
function onLiabilityChange(){
    let m = {'全部责任':100,'主要责任':70,'同等责任':50,'次要责任':30,'无责任':0};
    document.getElementById('liabilityPercentage').value = m[document.getElementById('liabilityType').value];
}

function init(){
    loadMemory();
    renderPlaintiffs();
    renderDefendants();
    renderThirdParties();
    renderLessees();
    
    document.getElementById('addPlaintiffBtn').onclick = () => { addPlaintiff(); renderPlaintiffs(); };
    document.getElementById('removePlaintiffBtn').onclick = () => { removePlaintiff(); renderPlaintiffs(); };
    document.getElementById('addDefendantBtn').onclick = () => { addDefendant(); renderDefendants(); };
    document.getElementById('removeDefendantBtn').onclick = () => { removeDefendant(); renderDefendants(); };
    document.getElementById('addThirdBtn').onclick = () => { addThirdParty(); renderThirdParties(); };
    document.getElementById('removeThirdBtn').onclick = () => { removeThirdParty(); renderThirdParties(); };
    document.getElementById('addLesseeBtn').onclick = () => { addLessee(); renderLessees(); };
    document.getElementById('removeLesseeBtn').onclick = () => { removeLessee(); renderLessees(); };
    document.getElementById('generateBtn').onclick = generateDefense;
    document.getElementById('memoryBtn').onclick = showMemoryPanel;
    document.getElementById('clearMemoryBtn').onclick = clearAllMemory;
    document.getElementById('closeModalBtn').onclick = closeMemoryPanel;
    document.getElementById('closeModalBtn2').onclick = closeMemoryPanel;
    document.getElementById('hasDeliveryDate').onchange = toggleDelivery;
    document.getElementById('hasRentalPeriod').onchange = toggleRental;
    document.getElementById('liabilityType').onchange = onLiabilityChange;
    
    let dp = '一、{liability_description}\n\n二、{point2_placeholder}\n\n三、本案应由保险公司在保险额度内予以赔付，不足部分由被告一承担。\n\n《中华人民共和国民法典》第一千二百一十三条规定："机动车发生交通事故造成损害，属于该机动车一方责任的，先由承保机动车强制保险的保险人在强制责任保险限额范围内予以赔偿；不足部分，由承保机动车商业保险的保险人按照保险合同的约定予以赔偿；仍然不足或者没有投保机动车商业保险的，由侵权人赔偿。"\n\n案涉车辆在保险公司处投保了交强险及商业机动车第三者责任保险（保额100万），本案交通事故发生在保险期间。';
    document.getElementById('defensePoints').value = dp;
    toggleDelivery();
    toggleRental();
    let statusSpan = document.getElementById('statusText');
    if(statusSpan) statusSpan.textContent = '✅ 就绪';
}

// 等待库加载完成后初始化
function startApp(){
    if(typeof window.docx !== 'undefined' && typeof window.saveAs !== 'undefined'){
        init();
        let statusSpan = document.getElementById('statusText');
        if(statusSpan) statusSpan.textContent = '✅ 就绪';
    }else{
        setTimeout(startApp, 500);
    }
}

// 动态加载库
function loadScript(src, callback){
    let script = document.createElement('script');
    script.src = src;
    script.onload = callback;
    document.head.appendChild(script);
}

loadScript('https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js', function(){
    loadScript('https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js', function(){
        startApp();
    });
});
